<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoonRiver-Studio | 月河工作室</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #111;
      color: #eee;
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: 3em;
      margin-top: 0;
      margin-bottom: 0.3em;
      border-bottom: 1px solid #333;
      padding-bottom: 0.3em;
    }
    .intro {
      font-size: 1.6em;
      margin-bottom: 2em;
    }
    .preview-container {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2em;
    }
    .preview-item {
      flex: 1;
      min-width: 300px;
      max-width: 450px;
      text-align: center;
    }
    .preview-item h3 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 1.4em;
    }
    .preview-item iframe {
      width: 100%;
      height: 300px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #000;
    }
    .center {
      text-align: center;
    }
    .logo {
      width: 220px;
      margin: 40px 0 30px;
      border-radius: 8px;
    }
    h2 {
      font-size: 2em;
      margin-bottom: 0.5em;
    }
    p {
      font-size: 1.2em;
      line-height: 1.6;
    }
    a {
      color: #8888ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>MoonRiver-Studio.github.io</h1>
  <div class="intro">
    月河工作室 | 独立游戏开发者 | DragonRuby PC 游戏 | godot游戏
  </div>

  <div class="preview-container">
    <div class="preview-item">
      <h3>月河工作室 | LXGW Version</h3>
      <iframe src="moonriver-logo-moon.html"></iframe>
    </div>
    <div class="preview-item">
      <h3>月河工作室 | songti Version</h3>
      <iframe src="moonriver-logo-moon-songti.html"></iframe>
    </div>
  </div>

  <div class="center">
    <img src="logo.jpeg" alt="MoonRiver Studio" class="logo">
    <h2>MoonRiver Studio</h2>
    <p>月河工作室 | 独立游戏开发者</p>
    <p>目前正在制作中……</p>
    <br>
    <p><a href="https://github.com/MoonRiver-Studio">查看开发进度</a></p>
    <br>
    <p>更多游戏信息请关注后续更新</p>
  </div>

</html>
