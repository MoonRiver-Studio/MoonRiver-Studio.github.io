<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月河工作室 Logo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600&display=swap');

        /* 霞骛文楷 */
        @font-face {
            font-family: 'LXGW WenKai';
            src: url('https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/lxgwwenkai-regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e1a;
            font-family: 'LXGW WenKai', 'Noto Serif SC', serif;
        }

        .logo-container {
            position: relative;
            width: 800px;
            height: 800px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Background atmosphere - 保持原样 */
        .bg-atmosphere {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse 80% 50% at 50% 20%, rgba(30, 58, 95, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 50% 80%, rgba(20, 40, 60, 0.5) 0%, transparent 50%),
                linear-gradient(180deg, #0a0e1a 0%, #0d1525 50%, #0a0e1a 100%);
        }

        /* Stars - 保持原样 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* ========== 新月牙月亮实现 ========== */
        .moon-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 30px;
            transform: rotate(15deg); /* 整体倾斜15度 */
        }

        /* 外层辉光 - 柔和扩散 */
        .moon-glow-outer {
            position: absolute;
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 50% 50%,
                rgba(255, 255, 255, 0.15) 0%,
                rgba(200, 220, 255, 0.08) 30%,
                rgba(150, 180, 220, 0.03) 50%,
                transparent 70%);
            filter: blur(20px);
            border-radius: 50%;
        }

        /* 中层辉光 - 更集中 */
        .moon-glow-inner {
            position: absolute;
            width: 160px;
            height: 160px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 50% 50%,
                rgba(255, 255, 255, 0.3) 0%,
                rgba(220, 235, 255, 0.15) 40%,
                transparent 60%);
            filter: blur(12px);
            border-radius: 50%;
        }

        /* 月牙本体 - 使用mask实现 */
        .moon {
            position: absolute;
            width: 140px;
            height: 140px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: #ffffff;
            /* 关键：用径向渐变创建月牙遮罩 */
            mask: radial-gradient(circle at 75% 50%, 
                transparent 0%, 
                transparent 55%, 
                black 55.5%, 
                black 100%);
            -webkit-mask: radial-gradient(circle at 75% 50%, 
                transparent 0%, 
                transparent 55%, 
                black 55.5%, 
                black 100%);
            /* 内发光让边缘柔和 */
            box-shadow: 
                inset 0 0 20px rgba(200, 220, 255, 0.5),
                0 0 40px rgba(255, 255, 255, 0.4),
                0 0 80px rgba(200, 220, 255, 0.2);
        }

        /* 月牙边缘柔化层 */
        .moon-soften {
            position: absolute;
            width: 140px;
            height: 140px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.8);
            mask: radial-gradient(circle at 75% 50%, 
                transparent 0%, 
                transparent 54%, 
                black 56%, 
                black 100%);
            -webkit-mask: radial-gradient(circle at 75% 50%, 
                transparent 0%, 
                transparent 54%, 
                black 56%, 
                black 100%);
            filter: blur(1px);
            opacity: 0.6;
        }

        

      
        /* Light rays - 保持原样但调整位置 */
        .rays {
            position: absolute;
            width: 100%;
            height: 100%;
            top: -10%;
            background: conic-gradient(from 270deg at 50% 50%,
                transparent 0deg,
                rgba(255, 255, 255, 0.02) 10deg,
                transparent 20deg,
                rgba(255, 255, 255, 0.015) 30deg,
                transparent 40deg,
                rgba(255, 255, 255, 0.02) 50deg,
                transparent 60deg,
                rgba(255, 255, 255, 0.015) 70deg,
                transparent 80deg,
                rgba(255, 255, 255, 0.02) 90deg,
                transparent 100deg);
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Text - 保持原样 */
        .text-container {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: 100px; /* 调整以避免与倒影重叠 */
        }

        .chinese-text {
            font-family: 'LXGW WenKai', 'Noto Serif SC', serif;
            font-size: 52px;
            font-weight: normal;
            color: #e8ecf4;
            letter-spacing: 20px;
            text-shadow:
                0 0 20px rgba(200, 220, 255, 0.3),
                0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
        }

        .english-text {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 300;
            color: rgba(200, 215, 235, 0.7);
            letter-spacing: 12px;
            text-transform: uppercase;
        }

        .divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(150, 180, 220, 0.5),
                transparent);
            margin: 25px auto;
        }

        /* Floating particles - 保持原样 */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(200, 230, 255, 0.6);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-20px) translateX(10px); opacity: 0.6; }
            50% { transform: translateY(-30px) translateX(-5px); opacity: 0.4; }
            75% { transform: translateY(-15px) translateX(15px); opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="bg-atmosphere"></div>

        <div class="rays"></div>

        <div class="stars">
            <div class="star" style="top: 15%; left: 20%; animation-delay: 0s;"></div>
            <div class="star" style="top: 25%; left: 75%; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 40%; left: 15%; animation-delay: 1s;"></div>
            <div class="star" style="top: 10%; left: 60%; animation-delay: 1.5s;"></div>
            <div class="star" style="top: 35%; left: 85%; animation-delay: 2s;"></div>
            <div class="star" style="top: 20%; left: 40%; animation-delay: 2.5s;"></div>
        </div>

        <!-- 新月牙月亮 -->
        <div class="moon-container">
            <div class="moon-glow-outer"></div>
            <div class="moon-glow-inner"></div>
            <div class="moon"></div>
            <div class="moon-soften"></div>
        </div>

       

        <div class="particle" style="top: 30%; left: 30%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 45%; left: 70%; animation-delay: 1s;"></div>
        <div class="particle" style="top: 55%; left: 25%; animation-delay: 2s;"></div>

        <div class="text-container">
            <div class="chinese-text">月河工作室</div>
            <div class="divider"></div>
            <div class="english-text">MoonRiver Studio</div>
        </div>
        
    </div>
</body>
</html>
